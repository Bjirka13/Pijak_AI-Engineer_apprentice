name: Workflow CI MLflow

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  retrain-build-push:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: shipment-delay-risk-ci
      DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      SHAP_SAMPLE_SIZE: "200"
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKER_IMAGE_NAME: shipment-delay-risk

    steps:
      - name: Pull repository
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: MLProject/requirements.txt

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Train model with MLflow Project
        run: mlflow run MLProject -e main --env-manager=local

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: |
            MLProject/artifacts/
            MLProject/models/
            MLProject/mlruns/
            MLProject/run_id.txt
          if-no-files-found: warn

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image using MLflow
        run: |
          RUN_ID=$(cat MLProject/run_id.txt)
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/model" \
            --name "$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:${{ github.sha }}" \
            --enable-mlserver

      - name: Push Docker image
        run: |
          docker tag "$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:${{ github.sha }}" "$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:latest"
          docker push "$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:${{ github.sha }}"
          docker push "$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:latest"
