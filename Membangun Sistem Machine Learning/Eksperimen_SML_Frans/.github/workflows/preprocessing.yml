name: Automated Preprocessing

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.3 numpy==1.26.4 scikit-learn==1.6.1 joblib==1.4.2

      - name: Run preprocessing automation
        run: python preprocessing/automate_Frans.py

      - name: Upload preprocessing output
        uses: actions/upload-artifact@v4
        with:
          name: dataco-preprocessing-output
          path: |
            dataco_preprocessing/
            preprocessing_artifacts/
          if-no-files-found: error
